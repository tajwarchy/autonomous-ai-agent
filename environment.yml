name: autonomous-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # API framework
      - fastapi==0.111.0
      - uvicorn[standard]==0.29.0
      - pydantic==2.7.1

      # LLM & agent
      - requests==2.31.0
      - httpx==0.27.0

      # Tools
      - duckduckgo-search==5.3.1b1
      - wikipedia-api==0.6.0
      - beautifulsoup4==4.12.3

      # Vector memory
      - chromadb==0.5.0
      - sentence-transformers==2.7.0

      # Relational logging
      - aiosqlite==0.20.0

      # Monitoring
      - prometheus-client==0.20.0

      # Config
      - pyyaml==6.0.1

      # Terminal UI
      - rich==13.7.1

      # Utilities
      - python-multipart==0.0.9
      - tenacity==8.3.0